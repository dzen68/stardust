<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stardust — NASA Image Explorer</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- ═══ AUTH VIEW (shown when logged out) ═══ -->
    <section id="auth-view">
      <div class="auth-header">
        <span class="auth-brand-icon">✦</span>
        <h1>Stardust</h1>
      </div>
      <p class="tagline">NASA Astronomy Picture of the Day</p>

      <div class="auth-card">
        <div class="tabs" role="tablist">
          <button class="tab active" id="tab-login" role="tab"
            aria-selected="true" aria-controls="panel-login"
            onclick="switchTab('login')">Sign In</button>
          <button class="tab" id="tab-register" role="tab"
            aria-selected="false" aria-controls="panel-register"
            onclick="switchTab('register')">Register</button>
        </div>

        <div class="auth-alert" id="auth-alert" aria-live="polite"></div>

        <!-- Login -->
        <form class="auth-form" id="panel-login" role="tabpanel"
          aria-labelledby="tab-login" onsubmit="handleLogin(event)">

          <div class="auth-field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email"
              placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="auth-field">
            <label for="login-password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="login-password"
                placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="toggle-pass"
                onclick="togglePass('login-password', this)"
                aria-label="Toggle password">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-btn" id="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" hidden></span>
          </button>

          <p class="auth-switch">
            No account? <a href="#" onclick="switchTab('register'); return false;">Register</a>
          </p>
        </form>

        <!-- Register -->
        <form class="auth-form hidden" id="panel-register" role="tabpanel"
          aria-labelledby="tab-register" onsubmit="handleRegister(event)">

          <div class="auth-field">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username"
              placeholder="your_username" autocomplete="username"
              required minlength="3" />
          </div>

          <div class="auth-field">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email"
              placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="auth-field">
            <label for="reg-password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="reg-password"
                placeholder="Min. 6 characters" autocomplete="new-password"
                required minlength="6" />
              <button type="button" class="toggle-pass"
                onclick="togglePass('reg-password', this)"
                aria-label="Toggle password">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-btn" id="register-btn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader" hidden></span>
          </button>

          <p class="auth-switch">
            Have an account? <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
          </p>
        </form>
      </div>
    </section>

    <!-- ═══ MAIN APP VIEW (shown when logged in) ═══ -->
    <section id="app-view" class="hidden">
      <!-- Sophisticated Dashboard Header -->
      <header class="app-header">
        <div class="header-left">
          <span class="logo-symbol">✦</span>
          <span class="logo-text">STARDUST</span>
          <span class="logo-tag">NASA DEEP SPACE TERMINAL</span>
        </div>

        <div class="header-center">
          <div class="date-navigator">
            <button class="nav-arrow-btn" id="prev-day-btn" title="Previous Day">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="date-picker-wrapper">
              <input type="date" id="datepicker" />
            </div>
            <button class="nav-arrow-btn" id="next-day-btn" title="Next Day">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </button>
            <button class="random-btn" id="random-day-btn" title="Random Orbit">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
              <span>Random</span>
            </button>
          </div>
        </div>

        <div class="header-right">
          <span class="welcome-msg" id="welcome-msg"></span>
          <button class="logout-btn" onclick="handleLogout()">
            <span>Sign Out</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </header>

      <!-- Immersive Dashboard Grid -->
      <main class="dashboard-grid" id="app"></main>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
