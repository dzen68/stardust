<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to Stardust — NASA Astronomy Picture of the Day." />
    <title>Stardust — Sign In</title>
    <link rel="stylesheet" href="/src/auth.css" />
  </head>
  <body>

    <h1 class="site-title">Stardust</h1>
    <p class="site-sub">NASA Astronomy Picture of the Day</p>

    <div class="auth-card">

      <!-- Tabs -->
      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-login" role="tab"
          aria-selected="true" aria-controls="panel-login"
          onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-register" role="tab"
          aria-selected="false" aria-controls="panel-register"
          onclick="switchTab('register')">Register</button>
      </div>

      <!-- Alert -->
      <div class="alert" id="alert" aria-live="polite"></div>

      <!-- Login form -->
      <form class="form-panel" id="panel-login" role="tabpanel"
        aria-labelledby="tab-login" onsubmit="handleLogin(event)">

        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email"
            placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="login-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="login-password"
              placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pass"
              onclick="togglePass('login-password', this)"
              aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" hidden></span>
        </button>

        <p class="switch-text">
          No account? <a href="#" onclick="switchTab('register'); return false;">Register here</a>
        </p>
      </form>

      <!-- Register form -->
      <form class="form-panel hidden" id="panel-register" role="tabpanel"
        aria-labelledby="tab-register" onsubmit="handleRegister(event)">

        <div class="field">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username"
            placeholder="your_username" autocomplete="username"
            required minlength="3" />
        </div>

        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email"
            placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="reg-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="reg-password"
              placeholder="Min. 6 characters" autocomplete="new-password"
              required minlength="6" />
            <button type="button" class="toggle-pass"
              onclick="togglePass('reg-password', this)"
              aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" hidden></span>
        </button>

        <p class="switch-text">
          Already have one? <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
        </p>
      </form>

    </div>

    <script src="/src/auth.js"></script>
  </body>
</html>
